<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人简历</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.8;
            background-color: #f8f9fa;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #007bff;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #212529;
            font-size: 32px;
        }
        .header p {
            color: #6c757d;
            font-size: 18px;
            margin-top: 10px;
        }
        .section {
            margin-bottom: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #007bff;
            margin-bottom: 15px;
            border-left: 5px solid #007bff;
            padding-left: 10px;
        }
        .section ul {
            list-style: none;
            padding-left: 20px;
        }
        .section li {
            margin-bottom: 10px;
            font-size: 16px;
        }
        .project {
            margin-bottom: 15px;
        }
        .project h3 {
            color: #495057;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- 头部：你的个人信息 -->
    <div class="header">
        <h1>张三</h1>
        <p><i class="fa-solid fa-phone"></i> 138XXXX1234 | <i class="fa-solid fa-envelope"></i> zhangsan@163.com | <i class="fa-brands fa-github"></i> https://github.com/你的GitHub用户名</p>
    </div>

    <!-- 技能模块 -->
    <div class="section">
        <h2><i class="fa-solid fa-code"></i> 技术技能</h2>
        <ul>
            <li>办公软件：Word/Excel/PPT 熟练</li>
            <li>专业技能：XX专业相关技能（比如：数据分析、设计、编程等）</li>
            <li>其他技能：英语四级、驾照C1等</li>
        </ul>
    </div>

    <!-- 教育经历 -->
    <div class="section">
        <h2><i class="fa-solid fa-graduation-cap"></i> 教育经历</h2>
        <ul>
            <li>2020-2024 | XX大学 | XX专业 | 本科</li>
            <li>主修课程：XX、XX、XX（可选）</li>
        </ul>
    </div>

    <!-- 项目/实习经历 -->
    <div class="section">
        <h2><i class="fa-solid fa-briefcase"></i> 经历</h2>
        <div class="project">
            <h3>XX实习/XX项目（2023年X月-2023年X月）</h3>
            <ul>
                <li>负责XX工作/任务</li>
                <li>完成XX成果/收获</li>
            </ul>
        </div>
    </div>
</body>
</html>
